<div class="crear-distribuidor-container">
  <div class="header">
    <h1>Crear Distribuidor</h1>
    <button class="btn btn-sm btn-outline-secondary" routerLink="/distribuidores/lista">
      <i class="fas fa-arrow-left"></i>
    </button>
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <div class="form-group">
        <label for="nombre">Nombre completo *</label>
        <input 
          type="text" 
          id="nombre" 
          formControlName="nombre"
          placeholder="Ej: Juan Pérez"
          [class.error]="form.get('nombre')?.invalid && form.get('nombre')?.touched">
        <span class="error-text" *ngIf="getErrorMessage('nombre')">
          {{ getErrorMessage('nombre') }}
        </span>
      </div>

      <div class="form-group">
        <label for="email">Email *</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email"
          placeholder="distribuidor@email.com"
          [class.error]="form.get('email')?.invalid && form.get('email')?.touched">
        <span class="error-text" *ngIf="getErrorMessage('email')">
          {{ getErrorMessage('email') }}
        </span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña *</label>
        <div class="password-input">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            formControlName="password"
            placeholder="Mínimo 6 caracteres"
            [class.error]="form.get('password')?.invalid && form.get('password')?.touched">
          <button 
            type="button" 
            class="toggle-password" 
            (click)="togglePasswordVisibility()"
            [title]="showPassword ? 'Ocultar' : 'Mostrar'">
            <i class="fas" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
          </button>
        </div>
        <span class="error-text" *ngIf="getErrorMessage('password')">
          {{ getErrorMessage('password') }}
        </span>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" routerLink="/distribuidores/lista" [disabled]="loading">
          Cancelar
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="loading || form.invalid">
          {{ loading ? 'Creando...' : 'Crear Distribuidor' }}
        </button>
      </div>
    </form>
  </div>
</div>
