<div class="editar-empresa-container">
  @if (loading()) {
    <div class="loading">Cargando...</div>
  } @else {
    <div class="header">
      <h1>Editar Empresa</h1>
    </div>

    <form (ngSubmit)="guardar()" class="empresa-form">
      <div class="form-group">
        <label for="nombre">Nombre *</label>
        <input
          type="text"
          id="nombre"
          [(ngModel)]="formNombre"
          name="nombre"
          required
        />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="ruc">RUC</label>
          <input
            type="text"
            id="ruc"
            [(ngModel)]="formRuc"
            name="ruc"
            maxlength="13"
          />
        </div>

        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input
            type="tel"
            id="telefono"
            [(ngModel)]="formTelefono"
            name="telefono"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="formEmail"
          name="email"
        />
      </div>

      <div class="form-group">
        <label for="slogan">Slogan</label>
        <input
          type="text"
          id="slogan"
          [(ngModel)]="formSlogan"
          name="slogan"
        />
      </div>

      <div class="form-group">
        <label for="logo">Logo</label>
        <input
          type="file"
          id="logo"
          (change)="onLogoChange($event)"
          accept="image/*"
        />
        @if (getLogoUrl()) {
          <div class="logo-preview">
            <img [src]="getLogoUrl()" alt="Logo" />
          </div>
        }
      </div>

      <div class="form-actions">
        <button
          type="button"
          class="btn btn-secondary"
          (click)="cancelar()"
          [disabled]="guardando()"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="guardando()"
        >
          {{ guardando() ? 'Guardando...' : 'Guardar Cambios' }}
        </button>
      </div>
    </form>
  }
</div>
